name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # Install dependencies strictly from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers along with system dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: npx playwright test

      # Upload HTML report regardless of test outcome
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # Upload Playwright traces regardless of test outcome
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Playwright Tests Failed",
              "themeColor": "FF0000",
              "title": "Playwright Tests Failed",
              "sections": [
                {
                  "facts": [
                    { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                    { "name": "Author", "value": "${{ github.event.pull_request.user.login }}" },
                    { "name": "Branch", "value": "${{ github.head_ref }}" },
                    { "name": "Workflow Run", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                  ]
                }
              ]
            }'
