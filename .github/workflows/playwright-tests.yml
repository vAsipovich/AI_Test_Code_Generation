name: Playwright Tests

on:
  pull_request:
    branches: [ ci ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # Install dependencies strictly from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers along with system dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: npx playwright test

      # Upload HTML report regardless of test outcome
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # Upload Playwright traces regardless of test outcome
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
